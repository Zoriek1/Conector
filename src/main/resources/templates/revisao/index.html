<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Revisão')}"></head>
<body class="bg-light">
<nav th:replace="~{fragments/appnav :: navbar(${email})}"></nav>

<main class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1">Fila de revisão</h1>
            <p class="text-muted mb-0">Lançamentos que precisam de decisão humana.</p>
        </div>
        <span class="badge text-bg-warning"
              th:text="${itens.totalElements} + ' pendente(s)'">0 pendentes</span>
    </div>

    <div th:if="${itens.empty}" class="alert alert-success" role="status">
        Nenhuma transação aguardando revisão.
    </div>

    <div th:unless="${itens.empty}" class="table-responsive bg-white border rounded">
        <table class="table table-hover align-middle mb-0">
            <thead>
            <tr>
                <th>Data</th>
                <th>Conta</th>
                <th>Descrição</th>
                <th>Direção</th>
                <th class="text-end">Valor</th>
                <th>Sugestão</th>
                <th>Motivo</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${itens.content}">
                <td th:text="${item.data}">2026-01-01</td>
                <td th:text="${item.conta}">conta</td>
                <td th:text="${item.descricao ?: 'Sem descrição'}">descrição</td>
                <td th:text="${item.direcao}">CREDITO</td>
                <td class="text-end" th:text="${item.valorLiquido}">0.00</td>
                <td>
                    <span th:text="${item.classeSugerida}">INDEFINIDO</span>
                    <small class="text-muted d-block"
                           th:text="${item.confianca} + ' confiança'">0.000 confiança</small>
                </td>
                <td th:text="${item.motivo}">motivo</td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav th:if="${itens.totalPages} gt 1" class="mt-3" aria-label="Paginação da revisão">
        <ul class="pagination">
            <li class="page-item" th:classappend="${itens.first} ? 'disabled'">
                <a class="page-link" th:href="@{/revisao(page=${itens.number - 1})}">Anterior</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link" th:text="${itens.number + 1} + ' / ' + ${itens.totalPages}">1 / 1</span>
            </li>
            <li class="page-item" th:classappend="${itens.last} ? 'disabled'">
                <a class="page-link" th:href="@{/revisao(page=${itens.number + 1})}">Próxima</a>
            </li>
        </ul>
    </nav>
</main>
</body>
</html>
