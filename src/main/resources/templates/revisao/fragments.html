<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<!--
  Fragmentos HTMX da fila de revisão:
    :: fila  → tabela paginada (container alvo de paginação/recarga)
    :: linha → uma transação (alvo de outerHTML após cada comando)
    :: erro  → alerta de erro (404/409/422) injetado na região de erro
-->
<body>

<div th:fragment="fila" id="fila-container">
    <div th:if="${itens.empty}" class="alert alert-success" role="status">
        Nenhuma transação neste estado.
    </div>

    <div th:unless="${itens.empty}" class="table-responsive bg-white border rounded">
        <table class="table table-hover align-middle mb-0">
            <thead>
            <tr>
                <th>Data</th>
                <th>Conta</th>
                <th>Descrição</th>
                <th>Direção</th>
                <th class="text-end">Valor</th>
                <th>Sugestão</th>
                <th>Estado</th>
                <th class="text-end">Ações</th>
            </tr>
            </thead>
            <tbody>
            <th:block th:each="item : ${itens.content}">
                <tr th:replace="~{revisao/fragments :: linha(${item})}"></tr>
            </th:block>
            </tbody>
        </table>
    </div>

    <nav th:if="${itens.totalPages gt 1}" class="mt-3" aria-label="Paginação da revisão">
        <ul class="pagination">
            <li class="page-item" th:classappend="${itens.first} ? 'disabled'">
                <a class="page-link" href="#"
                   th:attr="hx-get=@{/revisao/fila(estado=${estado},page=${itens.number - 1})}"
                   hx-target="#fila-container" hx-swap="outerHTML">Anterior</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link"
                      th:text="${itens.number + 1} + ' / ' + ${itens.totalPages}">1 / 1</span>
            </li>
            <li class="page-item" th:classappend="${itens.last} ? 'disabled'">
                <a class="page-link" href="#"
                   th:attr="hx-get=@{/revisao/fila(estado=${estado},page=${itens.number + 1})}"
                   hx-target="#fila-container" hx-swap="outerHTML">Próxima</a>
            </li>
        </ul>
    </nav>
</div>

<!-- Linha única; recebe ${item} via parâmetro de fragmento. -->
<tr th:fragment="linha(item)" th:id="'linha-' + ${item.id}">
    <td th:text="${item.data}">2026-01-01</td>
    <td th:text="${item.conta}">conta</td>
    <td th:text="${item.descricao ?: 'Sem descrição'}">descrição</td>
    <td th:text="${item.direcao}">CREDITO</td>
    <td class="text-end" th:text="${item.valorLiquido}">0.00</td>
    <td>
        <span th:text="${item.classeSugerida}">INDEFINIDO</span>
        <small class="text-muted d-block"
               th:text="${item.confianca} + ' confiança'">0.000 confiança</small>
    </td>
    <td>
        <span class="badge text-bg-secondary" th:text="${item.estado}">EM_REVISAO</span>
        <small class="text-muted d-block" th:if="${item.motivo}" th:text="${item.motivo}">motivo</small>
    </td>
    <td class="text-end">
        <!-- Comandos de item EM_REVISAO -->
        <div th:if="${item.estado.name() == 'EM_REVISAO'}" class="d-flex flex-column gap-2 align-items-end">
            <form class="d-flex gap-1" th:attr="hx-post=@{/revisao/{id}/classificar(id=${item.id})}"
                  hx-target="closest tr" hx-swap="outerHTML">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="version" th:value="${item.version}">
                <select class="form-select form-select-sm" name="classe" aria-label="Classificar">
                    <option th:each="c : ${classes}" th:value="${c}" th:text="${c}">CLASSE</option>
                </select>
                <button class="btn btn-sm btn-outline-primary" type="submit">Classificar</button>
            </form>
            <div class="d-flex gap-1">
                <form th:attr="hx-post=@{/revisao/{id}/aprovar(id=${item.id})}"
                      hx-target="closest tr" hx-swap="outerHTML">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="version" th:value="${item.version}">
                    <button class="btn btn-sm btn-outline-success" type="submit">Aprovar p/ API</button>
                </form>
                <form th:attr="hx-post=@{/revisao/{id}/ofx(id=${item.id})}"
                      hx-target="closest tr" hx-swap="outerHTML">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="version" th:value="${item.version}">
                    <button class="btn btn-sm btn-outline-secondary" type="submit">Enviar p/ OFX</button>
                </form>
            </div>
            <form class="d-flex gap-1" th:attr="hx-post=@{/revisao/{id}/match(id=${item.id})}"
                  hx-target="closest tr" hx-swap="outerHTML">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="version" th:value="${item.version}">
                <select class="form-select form-select-sm" name="tipo" aria-label="Tipo do match">
                    <option value="CONTA_RECEBER">CONTA_RECEBER</option>
                    <option value="CONTA_PAGAR">CONTA_PAGAR</option>
                </select>
                <input class="form-control form-control-sm" name="idExterno"
                       placeholder="id Bling" aria-label="Id externo">
                <input class="form-control form-control-sm" name="taxa" type="number" step="0.01"
                       placeholder="taxa" aria-label="Taxa derivada">
                <button class="btn btn-sm btn-outline-info" type="submit">Match</button>
            </form>
        </div>

        <!-- Reprocessar item em FALHA -->
        <form th:if="${item.estado.name() == 'FALHA'}"
              th:attr="hx-post=@{/revisao/{id}/retry(id=${item.id})}"
              hx-target="closest tr" hx-swap="outerHTML">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="version" th:value="${item.version}">
            <button class="btn btn-sm btn-outline-warning" type="submit">Reprocessar</button>
        </form>

        <span th:if="${item.estado.name() != 'EM_REVISAO' and item.estado.name() != 'FALHA'}"
              class="text-muted small">Sem ações</span>
    </td>
</tr>

<div th:fragment="erro" class="alert alert-danger" role="alert" th:text="${erro}">erro</div>

</body>
</html>
