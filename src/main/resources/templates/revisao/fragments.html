<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="fila" id="fila-container">
    <div th:if="${mensagemLote}" class="alert alert-success" role="status" th:text="${mensagemLote}">
        Lote classificado.
    </div>

    <div th:if="${itens.empty}" class="empty-state" role="status">
        Nenhuma transação encontrada para os filtros atuais.
    </div>

    <div th:unless="${itens.empty}" class="data-surface table-responsive">
        <table class="table app-table align-middle mb-0">
            <thead>
            <tr>
                <th class="selection-col">
                    <label class="select-page-control">
                        <input class="form-check-input" type="checkbox"
                               data-select-page
                               aria-label="Selecionar todos os itens desta página">
                        <span>Página</span>
                    </label>
                </th>
                <th>Data</th>
                <th>Tipo</th>
                <th class="text-end">Valor</th>
                <th>Conta</th>
                <th>Descrição</th>
                <th>Categoria</th>
                <th>Estado</th>
                <th class="actions-col">Ações</th>
            </tr>
            </thead>
            <tbody>
            <th:block th:each="item : ${itens.content}">
                <tr th:replace="~{revisao/fragments :: linha(${item})}"></tr>
            </th:block>
            </tbody>
        </table>
    </div>

    <nav th:if="${itens.totalPages gt 1}" class="pagination-wrap" aria-label="Paginação da revisão">
        <ul class="pagination mb-0">
            <li class="page-item" th:classappend="${itens.first} ? 'disabled'">
                <a class="page-link" href="#"
                   th:attr="hx-get=@{/revisao/fila(estado=${estado},direcao=${direcao},classe=${classe},q=${q},page=${itens.number - 1},size=${tamanhoPagina})}"
                   hx-target="#fila-container" hx-swap="outerHTML">Anterior</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link"
                      th:text="${itens.number + 1} + ' / ' + ${itens.totalPages}">1 / 1</span>
            </li>
            <li class="page-item" th:classappend="${itens.last} ? 'disabled'">
                <a class="page-link" href="#"
                   th:attr="hx-get=@{/revisao/fila(estado=${estado},direcao=${direcao},classe=${classe},q=${q},page=${itens.number + 1},size=${tamanhoPagina})}"
                   hx-target="#fila-container" hx-swap="outerHTML">Próxima</a>
            </li>
        </ul>
    </nav>
</div>

<tr th:fragment="linha(item)" th:id="'linha-' + ${item.id}"
    class="review-row"
    data-select-row="true"
    th:attr="data-direcao=${item.direcao.name()}">
    <td class="selection-col">
        <input class="form-check-input review-select-checkbox" type="checkbox" form="form-classificar-lote"
               data-batch-item
               th:attr="data-direcao=${item.direcao.name()}"
               name="ids" th:value="|${item.id}:${item.version}|"
               th:aria-label="'Selecionar ' + ${item.descricao ?: item.id}">
    </td>
    <td class="text-nowrap" th:text="${item.data}">2026-01-01</td>
    <td>
        <span th:class="${item.direcao.name() == 'CREDITO'} ? 'direction-badge direction-in' : 'direction-badge direction-out'"
              th:text="${item.direcao.rotulo}">Entrada</span>
    </td>
    <td class="text-end money" th:text="${item.valorLiquido}">0.00</td>
    <td th:text="${item.conta}">conta</td>
    <td class="description-cell" th:text="${item.descricao ?: 'Sem descrição'}">descrição</td>
    <td>
        <span class="category-name" th:text="${item.classeSugerida.rotulo}">Categoria</span>
        <small class="text-muted d-block" th:text="${item.classeSugerida.grupoDre.rotulo}">DRE</small>
    </td>
    <td>
        <span class="status-pill"
              th:classappend="${item.estado.name() == 'FALHA'} ? ' status-danger' : ' status-warning'"
              th:text="${item.estado.rotulo}">Em revisão</span>
        <small class="text-muted d-block" th:if="${item.motivo}" th:text="${item.motivo}">motivo</small>
    </td>
    <td class="actions-col">
        <div th:if="${item.estado.name() == 'EM_REVISAO' or item.estado.name() == 'CLASSIFICADO'}"
             class="row-actions">
            <form class="inline-classifier"
                  th:attr="hx-post=@{/revisao/{id}/classificar(id=${item.id})}"
                  hx-target="closest tr" hx-swap="outerHTML">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="version" th:value="${item.version}">
                <select class="form-select form-select-sm" name="classe" aria-label="Classificar">
                    <option th:each="c : ${classes}"
                            th:if="${c.aceita(item.direcao)}"
                            th:value="${c.name()}"
                            th:text="${c.rotulo}">Categoria</option>
                </select>
                <button class="btn btn-sm btn-outline-primary" type="submit">Aplicar</button>
            </form>
            <div class="action-buttons">
                <form th:if="${item.classeSugerida.podeApi}"
                      th:attr="hx-post=@{/revisao/{id}/aprovar(id=${item.id})}"
                      hx-target="closest tr" hx-swap="outerHTML">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="version" th:value="${item.version}">
                    <button class="btn btn-sm btn-success" type="submit">API</button>
                </form>
                <form th:if="${item.classeSugerida.podeOfx}"
                      th:attr="hx-post=@{/revisao/{id}/ofx(id=${item.id})}"
                      hx-target="closest tr" hx-swap="outerHTML">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="version" th:value="${item.version}">
                    <button class="btn btn-sm btn-outline-secondary" type="submit">OFX</button>
                </form>
            </div>
        </div>

        <form th:if="${item.estado.name() == 'FALHA'}"
              th:attr="hx-post=@{/revisao/{id}/retry(id=${item.id})}"
              hx-target="closest tr" hx-swap="outerHTML">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="version" th:value="${item.version}">
            <button class="btn btn-sm btn-outline-warning" type="submit">Reprocessar</button>
        </form>

        <span th:if="${item.estado.name() != 'EM_REVISAO'
                      and item.estado.name() != 'CLASSIFICADO'
                      and item.estado.name() != 'FALHA'}"
              class="text-muted small">Sem ações</span>
    </td>
</tr>

<div th:fragment="erro" class="alert alert-danger" role="alert" th:text="${erro}">erro</div>

</body>
</html>
