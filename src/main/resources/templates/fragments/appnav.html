<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar(email)" class="app-nav">
    <div class="app-nav-inner">
        <a th:href="@{/inicio}" class="app-brand">Conciliador</a>
        <div class="app-nav-links">
            <a th:href="@{/inicio}">Início</a>
            <a th:href="@{/revisao}">Revisão</a>
            <a th:href="@{/transacoes}">Transações</a>
            <a th:href="@{/ofx/lotes}">OFX</a>
            <a th:href="@{/integracoes}">Integrações</a>
            <a th:href="@{/perfil}">Perfil</a>
        </div>
        <div class="app-user">
            <span th:text="${email}">email</span>
            <form th:action="@{/sair}" method="post" class="m-0">
                <button class="btn btn-outline-secondary btn-sm" type="submit">Sair</button>
            </form>
        </div>
    </div>
    <script>
        (function () {
            var path = window.location.pathname;
            document.querySelectorAll('.app-nav-links a').forEach(function (link) {
                var href = link.getAttribute('href');
                if (href && path.indexOf(href) === 0) {
                    link.classList.add('active');
                }
            });
        })();
    </script>
</nav>
</body>
</html>
