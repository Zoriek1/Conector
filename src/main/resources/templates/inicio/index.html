<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Início')}"></head>
<body class="bg-light">
<main class="container" style="max-width: 640px; margin-top: 6vh;">
    <h1 class="h3">Você está autenticado ✅</h1>
    <p class="mb-1">E-mail: <strong th:text="${email}">—</strong></p>
    <p>Empresa (tenant): <code th:text="${empresaId}">—</code></p>

    <form th:action="@{/sair}" method="post">
        <button type="submit" class="btn btn-outline-danger btn-sm">Sair</button>
    </form>

    <p class="text-muted mt-4 small">
        A tela de Início real (cards, integrações e atividade) permanece no
        próximo marco da tela 04.
    </p>
</main>
</body>
</html>
